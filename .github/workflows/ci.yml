# CI/CD Pipeline - Optimized with global caching for node_modules
# Based on Spirit Research Lab (SRL) best practices

on:
  push:
    branches: [ master, develop ]
    paths-ignore:
      - '.agent/**'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '.agent/**'

jobs:
  # Install job - runs first, caches node_modules for all other jobs
  install:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Restore node_modules from cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
        
    - name: Install dependencies
      if: steps.cache-restore.outputs.cache-hit != 'true'
      run: npm ci
      
    - name: Save node_modules to cache
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

  # Quality job - Linting and Typechecking in parallel
  quality:
    needs: [install]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Restore node_modules from cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Lint and Typecheck
      run: |
        npm run lint
        npm run typecheck

  # Unit tests
  test-unit:
    needs: [install]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Restore node_modules from cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Run unit tests
      run: npm run test:unit

  # Component tests
  test-component:
    needs: [install]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Restore node_modules from cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Run component tests
      run: npm run test:component

  # Build job
  build:
    needs: [install]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Restore node_modules from cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    - name: Build project
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7

  # E2E Tests job
  e2e-tests:
    needs: [install]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Restore node_modules from cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
      
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(npm list @playwright/test --depth=0 --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT
      
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
        restore-keys: |
          ${{ runner.os }}-playwright-
      
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps 
      
    - name: Install Playwright system dependencies (if cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps
      
    - name: Run E2E tests
      run: npm run test:e2e
      
    - name: Upload Playwright Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  # Deploy job - only on master branch after all tests pass
  deploy:
    needs: [quality, test-unit, test-component, e2e-tests, build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Set npm global prefix
      run: npm config set prefix '~/.npm-global'

    - name: Cache Firebase Tools
      id: firebase-tools-cache
      uses: actions/cache@v4
      with:
        path: ~/.npm-global
        key: ${{ runner.os }}-firebase-tools-${{ hashFiles('package-lock.json') }}

    - name: Install Firebase Tools
      if: steps.firebase-tools-cache.outputs.cache-hit != 'true'
      run: npm install -g firebase-tools

    - name: Add Firebase Tools to PATH
      run: echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: dist/
      
    - name: Deploy to Firebase
      run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
      # Note: Using FIREBASE_TOKEN for simplicity if service account JSON is not available.
      # Ideally, use google-github-actions/auth with a service account JSON.
