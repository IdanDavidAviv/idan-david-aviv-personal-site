<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity DNA: Neural Explorer</title>
    <!-- Dev: forward console â†’ Vite terminal via /__log -->
    <script>
        (function () {
            if (!window.location.hostname.includes('localhost') && !window.location.hostname.includes('127.0.0.1')) return;
            var LOG_URL = window.location.origin + '/__log';
            var orig = { log: console.log, info: console.info, warn: console.warn, error: console.error };
            function fwd(level, args) {
                var msg = Array.from(args).map(function (a) {
                    try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch (e) { return '[unserializable]'; }
                }).join(' ');
                fetch(LOG_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ level: level, message: '[ki-network] ' + msg, args: [] }) }).catch(function () { });
            }
            console.log = function () { orig.log.apply(console, arguments); fwd('INFO', arguments); };
            console.info = function () { orig.info.apply(console, arguments); fwd('INFO', arguments); };
            console.warn = function () { orig.warn.apply(console, arguments); fwd('WARN', arguments); };
            console.error = function () { orig.error.apply(console, arguments); fwd('ERROR', arguments); };
            window.addEventListener('error', function (e) {
                var detail = e.message;
                if (e.error && e.error.stack) detail += '\n' + e.error.stack;
                else detail += ' (' + e.filename + ':' + e.lineno + ':' + e.colno + ')';
                fwd('ERROR', [detail]);
            });
            window.addEventListener('unhandledrejection', function (e) {
                var reason = e.reason && e.reason.stack ? e.reason.stack : String(e.reason);
                fwd('ERROR', ['Unhandled Promise: ' + reason]);
            });

            // Minimal mode detector
            if (window.location.search.includes('minimal=true')) {
                document.documentElement.classList.add('is-minimal');
                document.addEventListener('DOMContentLoaded', function () {
                    document.body.classList.add('is-minimal');
                });
            }
        })();
    </script>
    <!-- ESM module: all libs bundled by Vite, single shared THREE instance -->
    <script type="module" src="/src/visualizations/ki-network.ts"></script>

    <style>
        /* Minimal mode hides internal UI */
        body.is-minimal #header,
        body.is-minimal #info-overlay {
            display: none !important;
        }

        body.is-minimal #container {
            border: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: transparent;
            /* Changed to transparent for embedding */
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            padding: 15px 20px;
            background: rgba(5, 5, 16, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(168, 85, 247, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .btn.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        #container {
            flex: 1;
            position: relative;
        }

        .view-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .view-panel.active {
            display: block;
        }

        #info-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(5, 5, 16, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            max-width: 250px;
            pointer-events: none;
            font-size: 0.8rem;
            backdrop-filter: blur(4px);
            z-index: 5;
            transition: all 0.3s ease;
        }

        #overlay-title {
            color: #a855f7;
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Fullscreen styles */
        body.is-fullscreen #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(5, 5, 16, 0.95);
            z-index: 110;
            /* Ensure it's above the container */
        }

        body.is-fullscreen #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
        }


        body.is-fullscreen #enter-fullscreen {
            display: none;
        }

        .close-x {
            display: none;
            font-size: 1.2rem;
            line-height: 1;
            padding: 4px 10px;
        }

        body.is-fullscreen .close-x {
            display: block;
        }
    </style>
</head>

<body>

    <div id="header">
        <div>
            <h2 style="margin:0; font-size: 1.2rem; color: #fff; letter-spacing: 1px;">NEURAL EXPLORER</h2>
            <p style="margin:5px 0 0 0; color: #94a3b8; font-size: 0.75rem;">Interactive KI Persistence Mapping</p>
        </div>
        <div id="controls">
            <button class="btn active" onclick="switchView(this, '3d')">3D Network</button>
            <button class="btn" onclick="switchView(this, '2d')">2D Physics</button>
            <button id="enter-fullscreen" class="btn" onclick="toggleFullscreen()" title="Full Screen">&#x26F6;</button>
            <button class="btn close-x" onclick="toggleFullscreen()" title="Exit Fullscreen">&#x2715;</button>
        </div>
    </div>

    <div id="container">
        <!-- View 1: 3D Force Graph -->
        <div id="view-3d" class="view-panel active" role="application" aria-label="3D Interactive Neural Network of Knowledge Items" tabindex="0"></div>

        <!-- View 2: Vis.js -->
        <div id="view-2d" class="view-panel" style="background: #050510;" role="img" aria-label="2D Physics Projection of Knowledge Items"></div>
    </div>

    <div id="info-overlay">
        <strong id="overlay-title">Immersive Neural Graph</strong>
        <p id="overlay-desc" style="margin:0; line-height: 1.4; color: #cbd5e1;">A 3D projection of the agent's
            persistent Knowledge Item network. Interconnects are verified SSOT bridges.</p>
    </div>

</body>

</html>
